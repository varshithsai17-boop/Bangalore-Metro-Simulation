name: Refresh metro data

# Re-runs the offline pipeline so the committed bundle tracks the latest public data.
# Weekly, plus on-demand. Commits the regenerated bundle only when it actually changes.

on:
  schedule:
    - cron: "17 3 * * 1" # Mondays 03:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipeline dependencies
        working-directory: data-pipeline
        run: pip install -r requirements.txt

      - name: Run pipeline
        working-directory: data-pipeline
        run: python src/pipeline.py

      - name: Commit refreshed bundle if changed
        run: |
          if git diff --quiet -- data-pipeline/output/metro-bundle.json web/public/data/metro-bundle.json; then
            echo "Bundle unchanged — nothing to commit."
          else
            git config user.name  "metro-data-bot"
            git config user.email "metro-data-bot@users.noreply.github.com"
            git add data-pipeline/output/metro-bundle.json web/public/data/metro-bundle.json
            git commit -m "chore(data): weekly metro bundle refresh"
            git push
          fi
